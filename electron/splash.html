<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { height: 100%; margin: 0; }
  body {
    background: #0b0f17; color: #e6edf3;
    font: 15px -apple-system, system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; -webkit-user-select: none;
  }
  .logo {
    width: 120px; height: 120px; border-radius: 26px; background: #161b26;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 56px; color: #FFC83D; letter-spacing: 1px;
    box-shadow: 0 10px 40px #0008;
  }
  .name { font-size: 22px; font-weight: 700; }
  .name small { color: #8aa0b6; font-weight: 400; font-size: 13px; display: block; margin-top: 4px; text-align: center; }
  .spinner { width: 26px; height: 26px; border: 3px solid #2a313d; border-top-color: #6ee7ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status { color: #8aa0b6; min-height: 20px; font-size: 13px; }
</style>
</head>
<body>
  <div class="logo">CF</div>
  <div class="name">ClipForge<small>local · free · gameplay editor</small></div>
  <div class="spinner"></div>
  <div id="status">Starting…</div>
  <script>
    window.setStatus = (t) => { document.getElementById('status').textContent = t || ''; };
  </script>
</body>
</html>
